name: Hourly Live Snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"

permissions:
  contents: write

jobs:
  refresh-live-snapshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh live snapshots
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
        run: node scripts/refresh-live-snapshots.mjs

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- live-snapshots.json; then
            echo "No snapshot changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live-snapshots.json
          git commit -m "chore: refresh live snapshots"
          git push
